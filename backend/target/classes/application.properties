server.port=8080
spring.application.name=olympic-humg

# ── Database ─────────────────────────────────────────────────────────────────
# ĐỔI MẬT KHẨU Ở ĐÂY
spring.datasource.url=jdbc:postgresql://localhost:5432/olympic_humg
spring.datasource.username=postgres
spring.datasource.password=xxxxxxxx
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=HumgOlympic2024SecretKeyMustBeAtLeast32Chars!!
app.jwt.expiration-ms=86400000

# ── File Upload ───────────────────────────────────────────────────────────────
# Thư mục lưu file upload (tương đối so với thư mục chạy project)
app.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ── Mail (để trống nếu chưa cần) ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.humg.olympic=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.multipart=DEBUG
